<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapelwood UMC — Houston Resource Finder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --dark: #171919;
    --white: #ffffff;
    --light-gray: #f4f4f4;
    --mid-gray: #e3e3e3;
    --text-muted: #666;
    --border: #ddd;

    /* Category colors */
    --food:        #2e7d32;
    --financial:   #1565c0;
    --housing:     #6a1b9a;
    --employment:  #e65100;
    --mental:      #00695c;
    --medical:     #c62828;
    --immigration: #4527a0;
    --classes:     #f57f17;
    --childcare:   #ad1457;
    --disaster:    #4e342e;
    --services:    #00838f;
    --transport:   #37474f;

    /* Restriction badges */
    --public-bg: #e8f5e9;
    --public-text: #2e7d32;
    --restrict-bg: #fff3e0;
    --restrict-text: #e65100;
    --serving-bg: #fce4ec;
    --serving-text: #ad1457;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--light-gray);
    color: var(--dark);
    min-height: 100vh;
  }

  /* ── HEADER ────────────────────────────────────── */
  header {
    background: var(--dark);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  .header-logo {
    height: 36px;
    flex-shrink: 0;
  }

  .header-divider {
    width: 1px;
    height: 36px;
    background: rgba(255,255,255,0.25);
    flex-shrink: 0;
  }

  .header-title {
    color: var(--white);
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    flex: 1;
    line-height: 1.2;
  }

  .header-title span {
    display: block;
    font-size: 0.75rem;
    font-weight: 400;
    opacity: 0.65;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .header-leaves {
    height: 30px;
    opacity: 0.55;
    flex-shrink: 0;
  }

  .admin-btn {
    flex-shrink: 0;
    padding: 7px 16px;
    background: rgba(255,255,255,0.12);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 7px;
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 600;
    text-decoration: none;
    letter-spacing: 0.03em;
    transition: background 0.15s;
    cursor: pointer;
  }
  .admin-btn:hover { background: rgba(255,255,255,0.22); }

  .hotlist-btn {
    flex-shrink: 0;
    padding: 7px 16px;
    background: #c62828;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 7px;
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 700;
    text-decoration: none;
    letter-spacing: 0.03em;
    transition: background 0.15s;
    cursor: pointer;
  }
  .hotlist-btn:hover { background: #e53935; }

  /* ── SEARCH BAR ─────────────────────────────────── */
  .search-bar {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
  }

  .search-inner {
    max-width: 860px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .search-input-wrap {
    position: relative;
    flex: 1;
  }

  .search-input-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }

  #searchInput {
    width: 100%;
    padding: 10px 12px 10px 40px;
    border: 2px solid var(--mid-gray);
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  #searchInput:focus { border-color: var(--dark); }

  .clear-btn {
    display: none;
    background: var(--mid-gray);
    border: none;
    border-radius: 6px;
    padding: 10px 14px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.85rem;
    color: var(--dark);
    font-weight: 600;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .clear-btn:hover { background: var(--border); }
  .clear-btn.visible { display: block; }

  /* ── TOOLTIP (shared) ────────────────────────────── */
  .has-tooltip {
    position: relative;
    cursor: help;
  }

  .has-tooltip .tooltip-box {
    display: none;
    position: absolute;
    z-index: 200;
    top: calc(100% + 8px);
    right: 0;
    width: 280px;
    background: #1e1e1e;
    color: #f5f5f5;
    font-size: 0.78rem;
    font-weight: 400;
    line-height: 1.5;
    padding: 10px 13px;
    border-radius: 8px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.28);
    pointer-events: none;
    white-space: normal;
    text-align: left;
  }

  .has-tooltip .tooltip-box::before {
    content: '';
    position: absolute;
    bottom: 100%;
    right: 14px;
    border: 6px solid transparent;
    border-bottom-color: #1e1e1e;
  }

  .has-tooltip:hover .tooltip-box {
    display: block;
  }

  /* Restriction badge tooltips — orange tint */
  .badge-restrict.has-tooltip .tooltip-box,
  .badge-serving.has-tooltip .tooltip-box {
    background: #3d1f00;
    border: 1px solid #ff9800;
  }
  .badge-restrict.has-tooltip .tooltip-box::before,
  .badge-serving.has-tooltip .tooltip-box::before {
    border-bottom-color: #3d1f00;
  }
  .badge-serving.has-tooltip .tooltip-box {
    background: #3b0022;
    border-color: #e91e63;
  }
  .badge-serving.has-tooltip .tooltip-box::before {
    border-bottom-color: #3b0022;
  }

  /* Verified dot tooltips */
  .dot-wrap {
    display: inline-block;
    position: relative;
    cursor: help;
    margin-left: 5px;
    vertical-align: middle;
  }
  .dot-wrap .tooltip-box {
    display: none;
    position: absolute;
    z-index: 200;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    width: 220px;
    background: #1e1e1e;
    color: #f5f5f5;
    font-size: 0.78rem;
    line-height: 1.5;
    padding: 8px 12px;
    border-radius: 8px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    pointer-events: none;
    white-space: normal;
    text-align: center;
  }
  .dot-wrap .tooltip-box::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-top-color: #1e1e1e;
  }
  .dot-wrap:hover .tooltip-box { display: block; }

  /* ── MAIN CONTENT ────────────────────────────────── */
  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 20px 24px 40px;
  }

  /* ── CATEGORY TILES ──────────────────────────────── */
  #categoryView {
    display: block;
  }

  .section-heading {
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 14px;
  }

  .category-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
  }

  .category-tile {
    background: var(--white);
    border-radius: 12px;
    padding: 18px 16px 16px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    border: 2px solid transparent;
    text-align: left;
  }

  .category-tile:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.13);
  }

  .tile-icon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    margin-bottom: 10px;
  }

  .tile-name {
    font-size: 0.9rem;
    font-weight: 700;
    line-height: 1.3;
    color: var(--dark);
    margin-bottom: 4px;
  }

  .tile-count {
    font-size: 0.75rem;
    color: var(--text-muted);
    font-weight: 500;
  }

  /* ── RESULTS VIEW ────────────────────────────────── */
  #resultsView { display: none; }

  .results-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .back-btn {
    background: none;
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--dark);
    transition: border-color 0.15s, background 0.15s;
    white-space: nowrap;
  }
  .back-btn:hover { border-color: var(--dark); background: var(--mid-gray); }

  .results-title {
    font-size: 1.1rem;
    font-weight: 700;
  }

  .results-count {
    font-size: 0.82rem;
    color: var(--text-muted);
    font-weight: 500;
    margin-left: auto;
    white-space: nowrap;
  }

  /* ── RESOURCE CARDS ──────────────────────────────── */
  .cards-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .resource-card {
    background: var(--white);
    border-radius: 12px;
    padding: 18px 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    border-left: 5px solid var(--border);
    transition: box-shadow 0.15s;
  }

  .resource-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.11); }

  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  .card-name {
    font-size: 1.15rem;
    font-weight: 700;
    flex: 1;
    min-width: 180px;
  }

  .access-badge {
    font-size: 0.73rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .badge-public { background: var(--public-bg); color: var(--public-text); }
  .badge-restrict { background: var(--restrict-bg); color: var(--restrict-text); }
  .badge-serving { background: var(--serving-bg); color: var(--serving-text); }

  .card-org {
    font-size: 0.82rem;
    color: var(--text-muted);
    font-weight: 500;
    margin-bottom: 8px;
  }

  .card-desc {
    font-size: 0.88rem;
    line-height: 1.55;
    color: #333;
    margin-bottom: 10px;
  }

  .card-details {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 6px 16px;
    margin-bottom: 10px;
  }

  .detail-row {
    font-size: 0.8rem;
    display: flex;
    gap: 6px;
    align-items: flex-start;
    line-height: 1.4;
  }

  .detail-label {
    font-weight: 700;
    color: var(--text-muted);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .detail-value { color: var(--dark); }

  .card-footer {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--mid-gray);
  }

  .card-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 14px;
    border-radius: 7px;
    font-size: 0.8rem;
    font-weight: 600;
    text-decoration: none;
    transition: opacity 0.15s;
  }
  .card-link:hover { opacity: 0.8; }

  .link-website {
    background: var(--dark);
    color: var(--white);
  }

  .link-phone {
    background: var(--light-gray);
    color: var(--dark);
    border: 1px solid var(--border);
  }

  .link-map {
    background: #e8f4fd;
    color: #0d47a1;
    border: 1px solid #90caf9;
  }

  .duplicate-note {
    font-size: 0.75rem;
    color: #888;
    font-style: italic;
    margin-top: 4px;
  }

  .eligibility-box {
    background: #fffbeb;
    border: 1px solid #fde68a;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 0.8rem;
    line-height: 1.45;
    margin-bottom: 10px;
    color: #78350f;
  }

  .eligibility-box strong { display: block; margin-bottom: 2px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; }

  .no-results {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-muted);
  }
  .no-results .big { font-size: 2.5rem; margin-bottom: 12px; }
  .no-results p { font-size: 0.95rem; }

  /* ── VERIFIED DOTS ───────────────────────────────── */
  .verified-dot, .unverified-dot, .stale-dot, .old-dot, .nodate-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    vertical-align: middle;
  }
  .verified-dot { background: #4caf50; }  /* green  — verified within 6 months */
  .stale-dot    { background: #ffa726; }  /* yellow — verified 6–12 months ago */
  .old-dot      { background: #e53935; }  /* red    — verified over 1 year ago */
  .nodate-dot   { background: #aaa;    }  /* grey   — no verification date */
  .unverified-dot { background: #ffa726; }

  /* ── MOBILE-ONLY BUTTONS ─────────────────────────── */
  .btn-211-mobile,
  .btn-hotlist-mobile {
    display: none; /* hidden on desktop */
  }

  /* ── RESPONSIVE ──────────────────────────────────── */
  @media (max-width: 600px) {
    header { padding: 12px 16px; }
    main { padding: 16px 14px 32px; }
    .search-bar, .filters { padding-left: 14px; padding-right: 14px; }

    .btn-hotlist-mobile {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      padding: 11px 16px;
      margin-bottom: 10px;
      background: #c62828;
      color: #fff;
      border: none;
      border-radius: 9px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: 0.02em;
      box-shadow: 0 2px 8px rgba(198,40,40,0.35);
      cursor: pointer;
    }
    .btn-hotlist-mobile:hover { background: #e53935; }

    .btn-211-mobile {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      padding: 11px 16px;
      margin-bottom: 16px;
      background: #1565c0;
      color: #fff;
      border-radius: 9px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: 0.02em;
      box-shadow: 0 2px 8px rgba(21,101,192,0.3);
    }
    .btn-211-mobile:hover { background: #1976d2; }
    .category-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .card-details { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <img class="header-logo"
    src="https://chapelwood.org/wp-content/uploads/2025/03/Chapelwood-Logo-White-1024x168.webp"
    alt="Chapelwood UMC">
  <div class="header-divider"></div>
  <div class="header-title">
    Houston Resource Finder
    <span>Volunteer Reference Tool</span>
  </div>
  <img class="header-leaves"
    src="https://chapelwood.org/wp-content/uploads/2025/03/LeavesWhite_Icon-1024x603.png"
    alt="">
  <button onclick="showHotList()" class="hotlist-btn">🚨 Emergency Resources</button>
  <a href="https://unitedwayhouston.org/what-we-do/211-texas-united-way-helpline/" target="_blank" rel="noopener" class="admin-btn" style="background:rgba(0,120,200,0.22); border-color:rgba(100,180,255,0.4);">211 United Way</a>
  <a href="https://pmeiller.github.io/Chapelwood-Resource-Tool/chapelwood-admin.html" class="admin-btn">Admin</a>
</header>

<div class="search-bar">
  <div class="search-inner">
    <div class="search-input-wrap">
      <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search by name, keyword, organization…" autocomplete="off">
    </div>
    <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕ Clear</button>
  </div>
</div>


<main>
  <!-- Category Tiles View -->
  <div id="categoryView">
    <button onclick="showHotList()" class="btn-hotlist-mobile">🚨 Emergency Resources (Hot List)</button>
    <a href="https://unitedwayhouston.org/what-we-do/211-texas-united-way-helpline/"
       target="_blank" rel="noopener"
       class="btn-211-mobile">
      📞 211 United Way Helpline
    </a>
    <p class="section-heading">Browse by Category</p>
    <div class="category-grid" id="categoryGrid"></div>
  </div>

  <!-- Results View -->
  <div id="resultsView">
    <div class="results-header">
      <button class="back-btn" onclick="showCategories()">
        ← All Categories
      </button>
      <span class="results-title" id="resultsTitle"></span>
      <span class="results-count" id="resultsCount"></span>
    </div>
    <div class="cards-list" id="cardsList"></div>
  </div>
</main>

<script>
// ── GOOGLE SHEETS LIVE DATA ────────────────────────────────────────────────
// Live data endpoint — Apps Script GET returns JSON directly from the sheet.
// This works from local file:// without CORS issues.
const SHEET_URL = "https://script.google.com/macros/s/AKfycbwO-NWVlqaeywzxPHg6e_LhWWBfRay6sn1eldda8g7qGV02hr0vhVpKEJU8jOT3yoYJ/exec";

// CSV column order (must match sheet headers exactly)
const CSV_COLS = ['Resource Name','Organization Name','Program Name','Resource Type','Resource Subtype','This is a HOT list item','Public Access?','Resource Description','Eligibility','Address','Public Phone Number','Public Email','Public Website','Hours','Walk-ins?','Languages','Application','Other Info','Duplicate?','Verified'];

function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = parseCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = vals[i] || null; });
    return obj;
  }).filter(r => r['Resource Name'] || r['Organization Name']);
}

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      result.push(cur.trim() === '' ? null : cur);
      cur = '';
    } else cur += c;
  }
  result.push(cur.trim() === '' ? null : cur);
  return result;
}

function showLoadingBanner(msg) {
  let b = document.getElementById('loadBanner');
  if (!b) {
    b = document.createElement('div');
    b.id = 'loadBanner';
    b.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:999;background:#1565c0;color:#fff;text-align:center;padding:8px;font-size:0.82rem;font-weight:600;font-family:inherit;';
    document.body.prepend(b);
  }
  b.textContent = msg;
  b.style.display = 'block';
}

function hideLoadingBanner() {
  const b = document.getElementById('loadBanner');
  if (b) b.style.display = 'none';
}

async function fetchSheetData() {
  if (!SHEET_URL) return;
  showLoadingBanner('⟳ Loading live data from Google Sheets…');
  try {
    const res = await fetch(SHEET_URL);
    if (!res.ok) throw new Error('Fetch failed');
    const fresh = await res.json();
    if (Array.isArray(fresh) && fresh.length > 0) {
      resources = fresh;
      hideLoadingBanner();
      buildCategoryTiles();
    } else {
      throw new Error('Empty or invalid data');
    }
  } catch (e) {
    hideLoadingBanner();
    console.warn('Could not load live sheet, using built-in data.', e);
  }
}

function getCategoryForResource(r) {
  const haystack = [
    r['Resource Type'] || '',
    r['Resource Subtype'] || '',
    r['Resource Name'] || '',
    r['Resource Description'] || ''
  ].join(' ').toLowerCase();

  for (const cat of CATEGORIES) {
    if (cat.keywords.some(kw => haystack.includes(kw))) return cat.key;
  }
  return 'services';
}

function accessClass(access) {
  if (!access) return 'badge-public';
  const a = access.toLowerCase();
  if (a.includes('serving ministry')) return 'badge-serving';
  if (a.includes('restricted')) return 'badge-restrict';
  return 'badge-public';
}

function accessLabel(access) {
  if (!access) return 'Public Access';
  const a = access.toLowerCase();
  if (a.includes('serving ministry')) return '🔒 Serving Ministry Only';
  if (a.includes('sbisd')) return '🔑 Referral: SBISD/CIS';
  if (a.includes('mam rep')) return '🔑 Referral: MAM Rep';
  if (a.includes('mam')) return '🔑 Referral: MAM';
  if (a.includes('cis')) return '🔑 Referral: CIS';
  if (a.includes('restricted')) return '🔑 Restricted / Referral';
  return '✅ Public Access';
}

function isRestricted(r) {
  const a = (r['Public Access?'] || '').toLowerCase();
  return a.includes('restricted') || a.includes('serving');
}

function isNA(val) {
  if (!val) return true;
  const v = val.toString().trim().toLowerCase();
  return v === 'n/a' || v === 'na' || v === 'null' || v === '';
}

function filterData(resources) {
  return resources.filter(r => {
    if (!currentSearch) return true;
    const q = currentSearch.toLowerCase();
    return ['Resource Name','Resource Description','Organization Name','Eligibility','Resource Type','Resource Subtype','Address','Languages']
      .some(k => r[k] && r[k].toString().toLowerCase().includes(q));
  });
}

function restrictionTooltipMsg(r) {
  const access = r['Public Access?'] || '';
  const a = access.toLowerCase();
  if (!a.includes('restricted') && !a.includes('serving')) return null;
  if (a.includes('serving ministry'))
    return '⚠️ <strong>Chapelwood Serving Ministry referral required.</strong><br>Clients cannot self-refer — must come through our internal Serving Ministry program.';
  if (a.includes('sbisd'))
    return '⚠️ <strong>SBISD/CIS referral required.</strong><br>Client must be referred by a Communities in Schools (CIS) caseworker at an SBISD school.';
  if (a.includes('mam rep'))
    return '⚠️ <strong>MAM representative referral required.</strong><br>Client must be referred by a specific MAM staff contact — see contact details on the card.';
  if (a.includes('mam'))
    return '⚠️ <strong>MAM client referral required.</strong><br>Client must already be actively engaged in Memorial Assistance Ministries programs.';
  if (a.includes('cis'))
    return '⚠️ <strong>CIS referral required.</strong><br>Must be referred through Communities in Schools.';
  return '⚠️ <strong>Restricted — referral required.</strong><br>Not open to the general public. Confirm eligibility before referring a client.';
}

  const a = address.toLowerCase();
  if (a.startsWith('n/a') || a.includes('online only') || a.includes('offered online')) return '';
  const query = encodeURIComponent(address.split(' AND ALSO')[0].trim());
  return `<a class="card-link link-map" href="https://maps.google.com/?q=${query}" target="_blank">🗺️ Map It</a>`;
}

// ── BUILD CATEGORY TILES ──────────────────────────────────────────────────────
function buildCategoryTiles() {
  const grid = document.getElementById('categoryGrid');
  grid.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const catResources = resources.filter(r => getCategoryForResource(r) === cat.key);
    if (catResources.length === 0) return;
    const tile = document.createElement('button');
    tile.className = 'category-tile';
    tile.onclick = () => showCategory(cat);
    tile.innerHTML = `
      <div class="tile-icon" style="background:${cat.color}20; color:${cat.color}">${cat.emoji}</div>
      <div class="tile-name">${cat.label}</div>
      <div class="tile-count">${catResources.length} resource${catResources.length !== 1 ? 's' : ''}</div>
    `;
    grid.appendChild(tile);
  });
}

// ── SHOW HOT LIST ─────────────────────────────────────────────────────────────
function showHotList() {
  currentCategory = null;
  currentSearch = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').classList.remove('visible');
  const hotResources = resources.filter(r => {
    const val = r['This is a HOT list item'];
    return val && val.toString().toLowerCase().trim() === 'yes';
  });
  renderResults('🚨 Emergency Resources (Hot List)', hotResources);
}

// ── SHOW CATEGORY ─────────────────────────────────────────────────────────────
function showCategory(cat) {
  currentCategory = cat;
  currentSearch = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').classList.remove('visible');
  renderResults(cat.label, resources.filter(r => getCategoryForResource(r) === cat.key));
}

// ── RENDER RESULTS ────────────────────────────────────────────────────────────
function renderResults(title, resources) {
  const filtered = filterData(resources);
  document.getElementById('categoryView').style.display = 'none';
  document.getElementById('resultsView').style.display = 'block';
  document.getElementById('resultsTitle').textContent = title;
  document.getElementById('resultsCount').textContent = `${filtered.length} result${filtered.length !== 1 ? 's' : ''}`;

  const list = document.getElementById('cardsList');
  list.innerHTML = '';

  if (filtered.length === 0) {
    list.innerHTML = `<div class="no-results"><div class="big">🔍</div><p>No resources found matching your filters.</p></div>`;
    return;
  }

  // Color for card border
  const catColor = currentCategory ? currentCategory.color : '#333';

  filtered.forEach(r => {
    const card = document.createElement('div');
    card.className = 'resource-card';
    card.style.borderLeftColor = catColor;

    const name = r['Resource Name'] || r['Organization Name'] || 'Unnamed Resource';
    const org = r['Organization Name'] || '';
    const prog = r['Program Name'];
    const orgLine = [org, prog && prog !== name ? prog : null].filter(Boolean).join(' — ');
    const desc = r['Resource Description'] || '';
    const eligibility = r['Eligibility'] || '';
    const address = r['Address'] || '';
    const phone = r['Public Phone Number'] || '';
    const website = r['Public Website'] || '';
    const hours = r['Hours'] || '';
    const walkins = r['Walk-ins?'] || '';
    const langs = r['Languages'] || '';
    const application = r['Application'] || '';
    const otherInfo = r['Other Info'] || '';
    const duplicate = r['Duplicate?'] || '';
    const verified = r['Verified'] || '';

    const accessBadgeClass = accessClass(r['Public Access?']);
    const accessText = accessLabel(r['Public Access?']);
    const tooltipMsg = restrictionTooltipMsg(r);
    const badgeHTML = tooltipMsg
      ? `<span class="access-badge ${accessBadgeClass} has-tooltip">${accessText}<span class="tooltip-box">${tooltipMsg}</span></span>`
      : `<span class="access-badge ${accessBadgeClass}">${accessText}</span>`;

    let verifiedLabel, verifiedDotClass;
    if (verified && verified !== 'NEED VERIFICATION') {
      // Parse the date and calculate age in months
      const verDate = new Date(verified);
      const now = new Date();
      const ageMonths = (now.getFullYear() - verDate.getFullYear()) * 12
                      + (now.getMonth() - verDate.getMonth());
      if (ageMonths >= 12) {
        verifiedDotClass = 'old-dot';
        verifiedLabel = `🔴 Verification outdated<br><span style="opacity:0.75">Last checked: ${verified} — over a year ago</span>`;
      } else if (ageMonths >= 6) {
        verifiedDotClass = 'stale-dot';
        verifiedLabel = `🟡 Verification aging<br><span style="opacity:0.75">Last checked: ${verified} — over 6 months ago</span>`;
      } else {
        verifiedDotClass = 'verified-dot';
        verifiedLabel = `✅ Verified<br><span style="opacity:0.75">Last checked: ${verified}</span>`;
      }
    } else if (verified === 'NEED VERIFICATION') {
      verifiedDotClass = 'unverified-dot';
      verifiedLabel = `⚠️ Needs verification<br><span style="opacity:0.75">Data may be outdated</span>`;
    } else {
      verifiedDotClass = 'nodate-dot';
      verifiedLabel = `⬜ Not yet verified<br><span style="opacity:0.75">Confirm details before referring</span>`;
    }
    const verifiedHTML = `<span class="dot-wrap"><span class="${verifiedDotClass}"></span><span class="tooltip-box">${verifiedLabel}</span></span>`;

    let detailsHTML = '';
    if (!isNA(address)) detailsHTML += `<div class="detail-row"><span class="detail-label">📍</span><span class="detail-value">${address}</span></div>`;
    if (!isNA(hours)) detailsHTML += `<div class="detail-row"><span class="detail-label">🕐</span><span class="detail-value">${hours}</span></div>`;
    if (!isNA(walkins)) detailsHTML += `<div class="detail-row"><span class="detail-label">Walk-ins:</span><span class="detail-value">${walkins}</span></div>`;
    if (!isNA(langs)) detailsHTML += `<div class="detail-row"><span class="detail-label">🌐</span><span class="detail-value">${langs}</span></div>`;
    if (!isNA(application)) detailsHTML += `<div class="detail-row"><span class="detail-label">Apply:</span><span class="detail-value">${application.startsWith('http') ? `<a href="${application}" target="_blank" style="color:var(--dark)">See website</a>` : application}</span></div>`;

    let footerHTML = '';
    if (!isNA(website)) footerHTML += `<a class="card-link link-website" href="${website}" target="_blank">🔗 Website</a>`;
    if (!isNA(phone)) footerHTML += `<a class="card-link link-phone" href="tel:${phone.replace(/[^0-9+]/g,'').split('A')[0]}">📞 ${phone}</a>`;
    footerHTML += mapItButton(address);

    card.innerHTML = `
      <div class="card-top">
        <div class="card-name">${name}${verifiedHTML}</div>
        ${badgeHTML}
      </div>
      ${orgLine ? `<div class="card-org">${orgLine}</div>` : ''}
      ${desc ? `<p class="card-desc">${desc}</p>` : ''}
      ${eligibility ? `<div class="eligibility-box"><strong>Eligibility</strong>${eligibility}</div>` : ''}
      ${detailsHTML ? `<div class="card-details">${detailsHTML}</div>` : ''}
      ${otherInfo ? `<div class="detail-row" style="margin-bottom:8px;font-size:0.8rem"><span class="detail-label">ℹ️ Note:</span><span class="detail-value" style="color:#555">${otherInfo}</span></div>` : ''}
      ${duplicate ? `<p class="duplicate-note">ℹ️ Also listed as: ${duplicate}</p>` : ''}
      ${footerHTML ? `<div class="card-footer">${footerHTML}</div>` : ''}
    `;
    list.appendChild(card);
  });
}

// ── BACK TO CATEGORIES ────────────────────────────────────────────────────────
function showCategories() {
  currentCategory = null;
  currentSearch = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').classList.remove('visible');
  document.getElementById('resultsView').style.display = 'none';
  document.getElementById('categoryView').style.display = 'block';
  buildCategoryTiles();
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', function() {
  currentSearch = this.value.trim();
  const clearBtn = document.getElementById('clearBtn');
  if (currentSearch) {
    clearBtn.classList.add('visible');
    currentCategory = null;
    renderResults(`Search: "${currentSearch}"`, resources);
  } else {
    clearBtn.classList.remove('visible');
    showCategories();
  }
});

function clearSearch() {
  document.getElementById('searchInput').value = '';
  currentSearch = '';
  document.getElementById('clearBtn').classList.remove('visible');
  showCategories();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
buildCategoryTiles();
fetchSheetData(); // fetch live data from Google Sheet if SHEET_URL is set
</script>
</body>
